<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>CV AI Pro</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#667eea,#764ba2);
  margin: 0;
  color: #333;
}

.container {
  max-width: 900px;
  margin: 40px auto;
  background: white;
  padding: 30px;
  border-radius: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

h1 {
  text-align: center;
  margin-bottom: 10px;
}

.subtitle {
  text-align: center;
  color: gray;
  margin-bottom: 20px;
}

input, textarea, select {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

textarea {
  resize: none;
}

button {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 8px;
  margin-top: 10px;
  font-size: 16px;
  cursor: pointer;
}

.generate {
  background: #667eea;
  color: white;
}

.generate:disabled {
  background: gray;
}

.copy {
  background: #48bb78;
  color: white;
}

.pdf {
  background: #ed8936;
  color: white;
}

.success {
  color: green;
  text-align: center;
  margin-top: 10px;
}

.error {
  color: red;
  text-align: center;
  margin-top: 10px;
}

#output {
  margin-top: 20px;
  padding: 15px;
  border-radius: 10px;
  border: 1px solid #ccc;
  min-height: 150px;
}
</style>
</head>

<body>

<div class="container">

<h1>🚀 Générateur CV IA</h1>
<p class="subtitle">Crée un CV professionnel en 10 secondes</p>

<select id="type">
  <option value="CV">CV</option>
  <option value="lettre de motivation">Lettre de motivation</option>
  <option value="email professionnel">Email professionnel</option>
</select>

<input id="name" placeholder="Ex : Jean Dupont">
<input id="job" placeholder="Ex : Développeur web">

<textarea id="skills" rows="3" placeholder="Ex : HTML, CSS, JavaScript, travail en équipe"></textarea>
<textarea id="experience" rows="3" placeholder="Ex : Stage chez X, projet Y"></textarea>
<textarea id="education" rows="2" placeholder="Ex : BTS SIO"></textarea>

<textarea id="jobOffer" rows="2" placeholder="Offre d'emploi (optionnel)"></textarea>

<button class="generate" id="generateBtn" onclick="generate()">✨ Générer</button>

<div id="status"></div>

<textarea id="output" placeholder="Ton document apparaîtra ici..."></textarea>

<button class="copy" onclick="copyText()">📋 Copier</button>
<button class="pdf" onclick="downloadPDF()">📄 Télécharger PDF</button>

</div>

<script>

let lastResult = "";

async function generate() {
  const btn = document.getElementById("generateBtn");
  const status = document.getElementById("status");

  const dataToSend = {
    type: document.getElementById("type").value,
    name: document.getElementById("name").value,
    job: document.getElementById("job").value,
    skills: document.getElementById("skills").value,
    experience: document.getElementById("experience").value,
    education: document.getElementById("education").value,
    jobOffer: document.getElementById("jobOffer").value
  };

  // UX loading
  btn.innerText = "⏳ Génération...";
  btn.disabled = true;
  status.innerHTML = "";

  try {
    const res = await fetch("/generate", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify(dataToSend)
    });

    const data = await res.json();

    lastResult = data.result;
    document.getElementById("output").value = lastResult;

    status.innerHTML = "<div class='success'>✅ Document généré avec succès</div>";

  } catch (err) {
    status.innerHTML = "<div class='error'>❌ Erreur serveur</div>";
  }

  btn.innerText = "✨ Générer";
  btn.disabled = false;
}

function copyText() {
  if (!lastResult) return alert("Rien à copier");
  navigator.clipboard.writeText(lastResult);
  alert("Copié !");
}

function downloadPDF() {
  if (!lastResult) return alert("Génère d'abord un document");

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const lines = doc.splitTextToSize(lastResult, 180);
  doc.text(lines, 15, 20);

  doc.save("document.pdf");
}

</script>

</body>
</html>
