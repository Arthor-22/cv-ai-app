<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">

<title>CV AI - Générateur de CV gratuit avec intelligence artificielle</title>

<meta name="description" content="Crée un CV professionnel gratuitement avec l'intelligence artificielle. Génère des CV, lettres de motivation et emails en quelques secondes.">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#667eea,#764ba2);
  margin: 0;
  padding: 0;
  color: #333;
}

.container {
  max-width: 900px;
  margin: 40px auto;
  background: white;
  padding: 30px;
  border-radius: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

h1 {
  text-align: center;
  margin-bottom: 5px;
}

.subtitle {
  text-align: center;
  color: gray;
  margin-bottom: 20px;
}

input, textarea, select {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

textarea {
  resize: none;
}

button {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 8px;
  margin-top: 10px;
  font-size: 16px;
  cursor: pointer;
}

.generate {
  background: #667eea;
  color: white;
}

.generate:disabled {
  background: gray;
}

.copy {
  background: #48bb78;
  color: white;
}

.pdf {
  background: #ed8936;
  color: white;
}

#status {
  text-align: center;
  margin-top: 10px;
}

.success { color: green; }
.error { color: red; }

#output {
  margin-top: 20px;
  width: 100%;
  min-height: 200px;
  padding: 15px;
  border-radius: 10px;
  border: 1px solid #ccc;
}
</style>
</head>

<body>

<div class="container">

<h1>🚀 Générateur CV IA</h1>
<p class="subtitle">Crée un CV professionnel en quelques secondes</p>

<select id="type">
  <option value="CV">CV</option>
  <option value="lettre de motivation">Lettre de motivation</option>
  <option value="email professionnel">Email professionnel</option>
</select>

<input id="name" placeholder="Nom complet (ex: Jean Dupont)">
<input id="job" placeholder="Poste (ex: Développeur web)">

<textarea id="skills" placeholder="Compétences (HTML, CSS, JS...)"></textarea>
<textarea id="experience" placeholder="Expérience professionnelle"></textarea>
<textarea id="education" placeholder="Formation"></textarea>
<textarea id="jobOffer" placeholder="Offre d'emploi (optionnel)"></textarea>

<button class="generate" id="btn" onclick="generate()">✨ Générer</button>

<div id="status"></div>

<textarea id="output" placeholder="Ton CV apparaîtra ici..."></textarea>

<button class="copy" onclick="copyText()">📋 Copier</button>
<button class="pdf" onclick="downloadPDF()">📄 Télécharger PDF</button>

</div>

<!-- SEO TEXT -->
<div style="display:none">
Générateur de CV IA gratuit, création de CV automatique, lettre de motivation, outil CV en ligne, CV rapide avec intelligence artificielle.
</div>

<script>

let lastResult = "";

async function generate() {
  const btn = document.getElementById("btn");
  const status = document.getElementById("status");

  btn.innerText = "⏳ Génération...";
  btn.disabled = true;
  status.innerHTML = "";

  const data = {
    type: document.getElementById("type").value,
    name: document.getElementById("name").value,
    job: document.getElementById("job").value,
    skills: document.getElementById("skills").value,
    experience: document.getElementById("experience").value,
    education: document.getElementById("education").value,
    jobOffer: document.getElementById("jobOffer").value
  };

  try {
    const res = await fetch("/generate", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify(data)
    });

    const json = await res.json();

    lastResult = json.result;
    document.getElementById("output").value = lastResult;

    status.innerHTML = "<div class='success'>✅ CV généré avec succès</div>";

  } catch (err) {
    status.innerHTML = "<div class='error'>❌ Erreur serveur</div>";
  }

  btn.innerText = "✨ Générer";
  btn.disabled = false;
}

function copyText() {
  if (!lastResult) return alert("Rien à copier");
  navigator.clipboard.writeText(lastResult);
  alert("Copié !");
}

function downloadPDF() {
  if (!lastResult) return alert("Génère d'abord un CV");

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const lines = doc.splitTextToSize(lastResult, 180);
  doc.text(lines, 15, 20);

  doc.save("cv-ai.pdf");
}

</script>

</body>
</html>
